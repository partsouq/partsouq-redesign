<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PartSouq — My Account</title>
<style>
  :root{
    --bg:#FFFFFF; --bg-alt:#F5F7FA; --bg-dark:#10192E;
    --border:#E2E8F0;
    --text:#161B22; --text-secondary:#57606F; --text-muted:#8A93A3;
    --brand-blue:#1E56D8; --brand-blue-dark:#14399B; --brand-blue-light:#EAF0FE;
    --accent-orange:#FF7A1A; --accent-orange-light:#FFF1E6;
    --success-green:#1FA37A; --success-green-light:#E7F8F1;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;border:1px solid var(--border);cursor:pointer;background:#fff;}
  .btn-primary{background:var(--brand-blue);color:#fff;border-color:var(--brand-blue);}
  header{border-bottom:1px solid var(--border);padding:14px 0;background:#fff;}
  header .wrap{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo .mark{width:38px;height:38px;border-radius:9px;border:2px solid var(--brand-blue);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--success-green);font-size:15px;}
  .logo .word b{font-size:19px;}
  .logo .word small{display:block;font-size:9px;letter-spacing:.08em;color:var(--text-muted);font-weight:700;}

  .layout{display:grid;grid-template-columns:230px 1fr;gap:28px;padding:30px 0 50px;}
  .side{border:1px solid var(--border);border-radius:var(--radius);padding:20px;height:fit-content;}
  .side .who{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
  .side .av{width:40px;height:40px;border-radius:50%;background:var(--brand-blue-light);color:var(--brand-blue);display:flex;align-items:center;justify-content:center;font-weight:700;}
  .side b{font-size:13.5px;}
  .side .who span{font-size:11.5px;color:var(--text-muted);}
  .side a{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;font-size:13.5px;color:var(--text-secondary);margin-bottom:2px;}
  .side a.active{background:var(--brand-blue-light);color:var(--brand-blue-dark);font-weight:700;}

  .content h2{font-size:20px;margin:0 0 18px;}
  .ordercard{border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
  .ordercard .oid{font-size:12px;color:var(--text-muted);margin-bottom:4px;}
  .ordercard .name{font-size:13.5px;font-weight:600;}
  .status{font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:20px;}
  .status.delivered{background:var(--success-green-light);color:var(--success-green);}
  .status.transit{background:var(--brand-blue-light);color:var(--brand-blue-dark);}
  .status.processing{background:var(--accent-orange-light);color:#B75C10;}
  .ordercard .price{font-weight:700;color:var(--brand-blue-dark);margin-right:16px;}
</style>
</head>
<body>

  <header><div class="wrap"><a href="index.html" class="logo"><div class="mark">PS</div><div class="word"><b>PartSouq</b><small>AUTO PARTS MARKETPLACE</small></div></a><a href="cart-checkout.html" class="btn" style="position:relative;">🛒 Cart<span class="ps-cart-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--accent-orange);color:#fff;border-radius:10px;font-size:10px;min-width:16px;height:16px;align-items:center;justify-content:center;padding:0 3px;">0</span></a></div></header>

  <div class="wrap layout">
    <aside class="side">
      <div class="who"><div class="av">IR</div><div style="display:flex;flex-direction:column;"><b>Irfan A.</b><span>irfan.aidigital@gmail.com</span></div></div>
      <a href="my-account.html" class="active">📦 My Orders</a>
      <a href="#addresses">📍 Addresses</a>
      <a href="#wishlist">♡ Wishlist</a>
      <a href="#profile">👤 Profile</a>
      <a href="#settings">⚙ Settings</a>
      <a href="login-register.html">🚪 Logout</a>
    </aside>

    <div class="content">
      <h2>My Orders</h2>
      <div id="orders-list"></div>
    </div>
  </div>

  <script src="products-data.js"></script>
  <script src="cart.js"></script>
  <script>
    const statusClass = {"Delivered":"delivered","Out for Delivery":"transit","Processing":"processing"};
    const statusLabel = {"Delivered":"✓ Delivered","Out for Delivery":"🚚 Out for Delivery","Processing":"⏳ Processing"};
    const wrap = document.getElementById("orders-list");
    psGetOrders().forEach(order => {
      const itemNames = order.items.map(i => i.name).join(" + ");
      const itemCount = order.items.reduce((n,i) => n + i.qty, 0);
      const div = document.createElement("div");
      div.className = "ordercard";
      div.innerHTML =
        '<div><div class="oid">Order #' + order.id + ' · ' + itemCount + ' item' + (itemCount === 1 ? "" : "s") + '</div><div class="name">' + itemNames + '</div></div>' +
        '<span class="status ' + (statusClass[order.status] || "processing") + '">' + (statusLabel[order.status] || order.status) + '</span>' +
        '<div class="price">' + psFmt(order.total) + '</div>' +
        '<a href="search-results.html" class="btn">View Details</a>';
      wrap.appendChild(div);
    });
    if (!psGetOrders().length){
      wrap.innerHTML = '<p style="color:var(--text-secondary);font-size:14px;">No orders yet. <a href="search-results.html" style="color:var(--brand-blue);font-weight:600;">Start shopping →</a></p>';
    }
  </script>
</body>
</html>
